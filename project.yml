name: WatchTogether
options:
  bundleIdPrefix: com.watchtogether
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"

targets:
  WatchTogether:
    type: application
    platform: iOS
    sources:
      - path: WatchTogether
    configFiles:
      Debug: WatchTogether/Configuration/Debug.xcconfig
      Release: WatchTogether/Configuration/Release.xcconfig
    settings:
      base:
        INFOPLIST_FILE: WatchTogether/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.watchtogether.app
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseMessaging
      - package: Kingfisher

  WatchTogetherTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WatchTogetherTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchtogether.app.tests
    dependencies:
      - target: WatchTogether

  WatchTogetherUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WatchTogetherUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchtogether.app.uitests
    dependencies:
      - target: WatchTogether
